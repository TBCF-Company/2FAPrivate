name: two_factor_auth_sdk
description: A Flutter SDK for two-factor authentication with device management
version: 1.0.0
homepage: https://github.com/TBCF-Company/2FAPrivate

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Device identification
  device_info_plus: ^9.1.0
  
  # OTP generation
  otp: ^3.1.4
  
  # Local storage
  shared_preferences: ^2.2.2
  
  # HTTP client
  http: ^1.1.0
  
  # Crypto utilities
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
