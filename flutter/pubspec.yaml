name: two_factor_auth_app
description: A Flutter mobile app for two-factor authentication
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Two Factor Auth SDK
  two_factor_auth_sdk:
    path: ../flutter_sdk/two_factor_auth_sdk
  
  # HTTP client
  http: ^1.1.0
  
  # QR code scanner
  qr_code_scanner: ^1.0.1
  
  # Local storage
  shared_preferences: ^2.2.2
  
  # OTP generation
  otp: ^3.1.4
  
  # QR code display
  qr_flutter: ^4.1.0
  
  # UI components
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
